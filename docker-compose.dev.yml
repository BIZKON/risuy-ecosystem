# Локальный dev-субстрат S0M. Эфемерно, НЕ прод. БД названа risuy_dev — чтобы
# rls_leads_messages_smoke.py прошёл свой DSN-гард (/risuy_dev) без правок.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gen_user_local
      POSTGRES_PASSWORD: gen_user_local
      POSTGRES_DB: risuy_dev
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gen_user_local -d risuy_dev"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    # AOF: PEL/retry транспорта переживают рестарт Redis в dev (спека S2 §7).
    # Volume НЕ добавляем — `make down` = `down -v` остаётся чистилкой; прод-Redis — S7M.
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  engine-ingest:
    build:
      context: .
      dockerfile: engine/common/Dockerfile
    command: python -m engine.ingest_consumer.main
    # engine_rw создаётся в db-init ПОСЛЕ старта инфры; при гонке контейнер
    # переподключается, а не остаётся Exited (make up гарантирует порядок отдельно).
    restart: unless-stopped
    # Явный грейс: среда может отдавать контейнерам StopTimeout=1с (наблюдалось на
    # Docker Desktop 29.x) → SIGKILL раньше, чем консьюмер дочитает XREADGROUP BLOCK
    # (INGEST_BLOCK_MS=5с) и закроет пул. 15с покрывает блок + graceful-очистку.
    stop_grace_period: 15s
    environment:
      ENGINE_DSN: postgresql://engine_rw:engine_rw_local@postgres:5432/risuy_dev
      REDIS_URL: redis://redis:6379/0
      HEALTH_PORT: "8090"
      # Стабильное имя консьюмера: дефолт hostname (config.py, остаётся для N>1)
      # в dev плодит мёртвого консьюмера в группе на каждый re-create контейнера
      # (PEL подхватывает наш reclaim, но реестр консьюмеров растёт без чистки).
      INGEST_CONSUMER: "ingest-1"
    ports: ["8090:8090"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # dev-профиль: одноразовый producer для walking-skeleton (make skeleton).
  engine-stub:
    profiles: ["skeleton"]
    build:
      context: .
      dockerfile: engine/common/Dockerfile
    command: python -m engine._stub_producer.main
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_started }
