name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff==0.8.4
      - run: ruff check engine/ scripts/
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Мультиплекс-образ бот+панель не сломан.
      - run: docker build -t risuy-multiplex .
      # Base-образ движка собирается.
      - run: docker build -f engine/common/Dockerfile -t risuy-engine .
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
